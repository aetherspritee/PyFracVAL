# Marvin profiling preset for local-vs-remote comparisons

[defaults]
execution_mode = "sequential"
output_root = "benchmark_results/profiles/marvin_profile"
n_values = [128, 256, 512]
repeats = 5
n_aggregates = 48
warmup_tasks = 4
seed_start = 1431354440
trial_timeout = 300
local_workers = 4
profile = true

[defaults.simulation]
Df = 1.8
kf = 1.0
rp_g = 100.0
rp_gstd = 1.5
tol_ov = 1.0e-6
n_subcl_percentage = 0.1
ext_case = 0

[defaults.algorithm]
use_cca_incremental_overlap = true
cca_incremental_full_sync_period = 8
cca_candidate_policy = "leaf_hybrid"
cca_score_topk_per_class = 32
cca_retry_rotation_mode = "single" # single | alternate | dual_jitter | coarse_grid | coarse_to_fine
cca_retry_escalate_after = 120
cca_dual_jitter_interval = 5
cca_dual_jitter_deg = 8.0
cca_coarse_sweep_steps = 10
cca_coarse_spin_anchor_steps = 6
cca_coarse_spin_moving_steps = 6
cca_coarse_fine_coarse_fraction = 0.67
cca_coarse_fine_spin_deg = 12.0
profile_cca_retry_modes = false

[[runs]]
name = "marvin_profile"
scheduler = "tcp://marvin.bv.e-technik.tu-dortmund.de:8786"
profile = true
