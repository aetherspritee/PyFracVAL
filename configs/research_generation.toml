# research_generation.toml
# Generate research clusters for morphology analysis.
#
# Specification
# -------------
# N values  : 8, 20, 48, 80, 128, 256, 384, 512, 640, 768, 896, 1024
# Replicates: 5 per N (independent seeds → slight structural variation)
# Median r  : 10 (rp_g = 10.0)
# Output    : benchmark_results/research_clusters/
#
# Preset rationale (Df=2.0, kf=1.0, sigma=1.5)
# -----------------------------------------------
# Df=2.0, kf=1.0 is the "standard" fractal aggregate used in the literature
# (e.g. soot, carbon black; Sorensen 2001).  sigma=1.5 is moderate
# polydispersity, physically realistic.
#
# CONFIRMED STABLE by N-scaling sweep (2026-03-12):
#   Df=2.0, kf=1.0, sigma=1.5 achieved 100% success rate at all N tested:
#   N=64, 128, 256, 512, 1024 (20 trials each).
#
# X = (N/kf)^(1/Df) at each N:
#   N=8    → X=2.8    N=80   → X=8.9    N=512  → X=22.6
#   N=20   → X=4.5    N=128  → X=11.3   N=640  → X=25.3
#   N=48   → X=6.9    N=256  → X=16.0   N=768  → X=27.7
#                               N=384  → X=19.6   N=896  → X=29.9
#                                                  N=1024 → X=32.0
#
# Run with (once preset confirmed):
#   uv run python benchmarks/stability_sweep.py --config configs/research_generation.toml

sizes  = [8, 20, 48, 80, 128, 256, 384, 512, 640, 768, 896, 1024]
sigmas = [1.5]

df_values = [2.0]
kf_values = [1.0]

trials   = 5
save_raw = true   # save .dat files — these are the research outputs
output_dir = "benchmark_results/research_clusters"

[dask]
enable            = true
scheduler_address = "tcp://marvin.bv.e-technik.tu-dortmund.de:8786"

[simulation]
rp_g               = 10.0   # median particle radius = 10
tol_ov             = 1.0e-6
n_subcl_percentage = 0.1
ext_case           = 0
# Generous timeout for large N; small N (8, 20) should be sub-second
trial_timeout      = 600
