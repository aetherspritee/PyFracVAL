# Benchmark config for densification in hard regime
# Generate at Df=2.0 (high success rate), densify to Df=2.25

[defaults]
execution_mode = "sequential"
output_root = "benchmark_results/profiles/densify_probe_v1"
n_values = [128]
repeats = 3
n_aggregates = 10
warmup_tasks = 1
seed_start = 1431354440
trial_timeout = 300
local_workers = 4
profile = false

[defaults.simulation]
Df = 2.25
kf = 0.95
rp_g = 100.0
rp_gstd = 1.9
tol_ov = 1.0e-6
n_subcl_percentage = 0.1
ext_case = 0

[defaults.algorithm]
use_cca_incremental_overlap = true
cca_incremental_full_sync_period = 8
cca_candidate_policy = "leaf_hybrid"
cca_score_topk_per_class = 32
cca_retry_rotation_mode = "single"
cca_retry_escalate_after = 120
cca_soft_accept_enabled = false
profile_cca_retry_modes = true

# Baseline: no densification (original hard-regime Df=2.25)
[[runs]]
name = "baseline_hard_no_densify"
scheduler = "local"
[runs.algorithm]
densify_enabled = false

# Radial densification: generate at Df=2.0, densify to Df=2.25
[[runs]]
name = "densify_radial_df20"
scheduler = "local"
[runs.simulation]
Df = 2.25
kf = 0.95
[runs.algorithm]
densify_enabled = true
densify_source_df = 2.0
densify_source_kf = 1.0
densify_method = "radial"
densify_rtol = 0.05
densify_max_push_iters = 50

# Radial densification: generate at Df=1.8, densify to Df=2.25
[[runs]]
name = "densify_radial_df18"
scheduler = "local"
[runs.simulation]
Df = 2.25
kf = 0.95
[runs.algorithm]
densify_enabled = true
densify_source_df = 1.8
densify_source_kf = 1.0
densify_method = "radial"
densify_rtol = 0.05
densify_max_push_iters = 50

# Voronoi densification: generate at Df=2.0, densify to Df=2.25
[[runs]]
name = "densify_voronoi_df20"
scheduler = "local"
[runs.simulation]
Df = 2.25
kf = 0.95
[runs.algorithm]
densify_enabled = true
densify_source_df = 2.0
densify_source_kf = 1.0
densify_method = "voronoi"
densify_rtol = 0.05
densify_max_push_iters = 30
densify_max_densify_iters = 15
